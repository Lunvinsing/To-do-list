<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkit</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="stylesheet" href="./css/font.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="./auth/google.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
  </head>
  <body class="bg-[#1d2634] min-h-screen flex flex-col">
    <nav id="navbar">
      <div class="navbar bg-gradient-to-r from-fuchsia-500 to-cyan-500 shadow-sm">
        <div class="navbar-start">
        </div>
        <div class="navbar-center">
          <a class="text-xl text-gray-800 text-bold">Checkit</a>
        </div>
        <div class="navbar-end">
      </div>
    </div>
  </div>
</nav>

    <main class="flex-1">
      <div class="bg-[#1d2634] grid grid-cols-1 justify-items-center text-white m-20">
      <div class="bg-[#111928] w-205 rounded-lg shadow-lg flex flex-col items-center p-4">
    
    
      <div class="flex items-center justify-center">
      <img src="./assets/logo.png" alt="Checkit logo" class="h-12">
    </div>
    
  <p class="text-white items-center " id="welcome">
      <h1 class="text-2xl font-bold">Welcome to Checkit!</h1>
      <h2 class="text-sm mb-5 mx-7">Checkit is a simple to-do list application designed to help you stay organized and productive. With Checkit, you can easily create, manage, and track your tasks in one convenient place!</h2>
  </p>
        <!-- Add your tasks here -->
  <div>

    <label for="hs-trailing-button-add-on" class="sr-only">Label</label>
    <div class="flex rounded-lg lg:w-180 w-full">
      <input type="text" id="inputBox" name="hs-trailing-button-add-on" placeholder="Add your task" class="py-2.5 sm:py-3 px-4 block w-full bg-layer border-layer-line border-e-transparent rounded-s-lg sm:text-sm text-foreground placeholder:text-muted-foreground-1 focus:z-10 focus:border-primary-focus focus:ring-primary-focus disabled:opacity-50 disabled:pointer-events-none">
      <button onclick="addTask()" type="button" class="py-3 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-e-md bg-gradient-to-r from-fuchsia-500 to-cyan-500 text-white hover:from-purple-600 hover:to-pink-600 focus:outline-hidden disabled:opacity-50 disabled:pointer-events-none">
        Add
      </button>

          </div>
    <div class="flex w-full flex-col">

  <div>
    <ul id="taskList">
      <!-- <li class="checked">Your task will appear here</li>
      <li>Your task will appear here</li>
      <li>Your task will appear here</li> -->

    </ul>
  </div>
</div>
    </div>

      

    </main>

    <!-- footer -->
    <footer id="footer" class="footer footer-center bg-gradient-to-r from-fuchsia-500 to-cyan-500 text-white p-4">
      <p>Copyright © 2026 - All right reserved by Checkit</p>
    </footer>


  <script src="script.js"></script>
  </body>
</html>
