<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkit</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <link rel="stylesheet" href="./css/font.css" />
    <link rel="stylesheet" href="./css/style.css" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body class="bg-[#1d2634] min-h-screen flex flex-col w-full">
    <nav class="w-full">
      <div
        class="navbar bg-gradient-to-r from-fuchsia-500 to-cyan-500 shadow-sm w-full"
      >
        <div class="navbar-center mx-auto">
          <a class="text-lg sm:text-xl md:text-2xl text-gray-800 font-bold">
            Checkit
          </a>
        </div>
      </div>
    </nav>

    <main
      class="flex-1 w-full flex items-center justify-center px-4 py-6 sm:px-6 lg:px-8"
    >
      <section
        class="bg-[#111928] w-full max-w-md sm:max-w-lg md:max-w-xl lg:max-w-2xl rounded-lg shadow-lg flex flex-col items-center p-4 sm:p-6 md:p-8 text-white"
      >
        <div class="flex items-center justify-center mb-4">
          <img
            src="./assets/logo.webp"
            alt="Checkit logo"
            width="48"
            height="48"
            class="h-10 sm:h-12 w-auto"
          />
        </div>

        <div class="text-white text-center w-full" id="welcome">
          <h1
            class="text-xl sm:text-2xl md:text-3xl font-bold mb-2 leading-tight"
          >
            Welcome to Checkit!
          </h1>

          <p class="text-sm sm:text-base leading-relaxed mb-5 sm:mb-6">
            Checkit is a simple to-do list application designed to help you stay
            organized and productive. With Checkit, you can easily create,
            manage, and track your tasks in one convenient place!
          </p>
        </div>

        <div class="w-full">
          <label for="inputBox" class="sr-only">Task input</label>

          <div class="flex flex-col sm:flex-row gap-3 w-full">
            <input
              type="text"
              id="inputBox"
              name="task-input"
              placeholder="Add your task"
              class="w-full min-w-0 flex-1 px-4 py-2.5 sm:py-3 text-sm sm:text-base rounded-lg bg-[#1d2634] border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:border-cyan-400"
            />

            <button
              onclick="addTask()"
              type="button"
              class="w-full sm:w-auto px-4 py-2.5 sm:py-3 text-sm sm:text-base font-semibold rounded-lg bg-gradient-to-r from-fuchsia-500 to-cyan-500 text-white hover:from-purple-600 hover:to-pink-600 focus:outline-none whitespace-nowrap"
            >
              Add
            </button>
          </div>
        </div>

        <div class="w-full mt-4 sm:mt-5">
          <ul id="taskList" class="w-full"></ul>
        </div>
      </section>
    </main>

    <footer
      class="footer footer-center bg-gradient-to-r from-fuchsia-500 to-cyan-500 text-white p-4 w-full"
    >
      <p class="text-xs sm:text-sm md:text-base font-bold text-center">
        Copyright &copy; 2026 - All right reserved by Checkit
      </p>
    </footer>

    <script src="./script.js"></script>
    <!-- <script src="./sw-register.js"></script> -->
  </body>
</html>
